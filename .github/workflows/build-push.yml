name: Build & Push — neoplasia-detection

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to Harbor registry"
        type: boolean
        default: true

env:
  IMAGE_NAME: neoplasia-detection

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdown
        run: pip install --quiet gdown

      # ── Cache weights (avoids re-downloading 1.75 GB on every run)
      - name: Cache model weights
        uses: actions/cache@v4
        id: cache-weights
        with:
          path: outputs_extracted/
          key: weights-gdrive-${{ secrets.GDRIVE_FILE_ID }}

      # ── Download weights (only on cache miss)
      - name: Download weights from Google Drive
        if: steps.cache-weights.outputs.cache-hit != 'true'
        run: |
          gdown "https://drive.google.com/uc?id=${{ secrets.GDRIVE_FILE_ID }}" \
                -O outputs.zip
          unzip -q -o outputs.zip -d outputs_extracted
          rm outputs.zip

      # ── Populate resources/
      - name: Set up resources/
        run: python scripts/setup_resources.py --extracted_dir outputs_extracted

      - name: Verify resources
        run: |
          echo "=== resources/ ==="
          ls -lh resources/*.pt
          ls -lh resources/calibration/

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # ── Build & Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image == true }}
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=neoplasia-detection
            org.opencontainers.image.description=RARE26 Barrett Neoplasia Detection — DINOv2+LoRA 5-model ensemble
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Summary
      - name: Print image digest
        run: |
          echo "Image pushed:"
          echo "  ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
